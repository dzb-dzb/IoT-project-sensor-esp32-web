<html>
  <head> </head>
  <body>
    <style>
      hr {
        display: flex;
        width: 650px;
        margin-left: 0%;
        opacity: 0.3;
      }
      .a {
        font-family: "Times New Roman", Times, serif;
        font-size: larger;
        color: rgb(255, 255, 255);
        width: 650px;

        margin-top: 10px;
      }
      #b {
        font-family: "Times New Roman", Times, serif;
        font-size: large;
        color: rgb(0, 255, 42);
      }
      body {
        background-color: black;
      }
      .total {
        display: flex;
        gap: 30px;
      }
      .box {
        border: 5px double rgb(0, 255, 42);
      }
      .chart {
        display: flex;
        width: 300px;
        height: 300px;

        justify-content: flex-end;
        align-items: flex-end;
      }
      .bar {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        background-color: rgb(255, 132, 0);
        border-top-left-radius: 45px;
        width: 45px;
      }
      .hum {
        background-color: rgb(26, 59, 246);
      }
      .container {
        color: aliceblue;
        display: flex;
        flex-direction: column;

        align-items: center;
        margin-right: 20px;
      }
      .time {
        font-size: small;
      }
      .text {
        color: rgb(1, 245, 9);
        display: flex;
        margin-left: 20px;
      }
    </style>
    <div class="a">
      DỰ ÁN SỬ DỤNG CẢM BIẾN DHT22 ĐO NHIỆT ĐỘ, ĐỘ ẨM KHU VỰC:
      <hr />

      <h1 id="b">=> VĂN TÂN - THUẦN TRUNG - NGHỆ AN (Nguyên Quán :D)</h1>
    </div>
    <br />

    <div class="total">
      <div class="box t">
        <h2 class="text">Nhiệt độ (°c)</h2>
        <div id="chartTemp" class="chart"></div>
      </div>
      <div class="box h">
        <h2 class="text">Độ ẩm (%)</h2>
        <div id="chartHum" class="chart"></div>
      </div>
    </div>
    <script>
      function createBar(value, time, type) {
        const container = document.createElement("div");
        container.className = "container";

        const bar = document.createElement("div");
        bar.className = "bar " + type;
        bar.style.height = value * 3 + "px";
        bar.textContent = value;

        const times = document.createElement("div");
        times.className = "time";
        times.textContent = time;

        container.appendChild(bar);
        container.appendChild(times);

        return container;
      }

      async function loadHistory() {
        try {
          const res = await fetch("https://server-ta9g.onrender.com/history");
          const history = await res.json();

          console.log(history);
          const chart1 = document.getElementById("chartTemp");
          const chart2 = document.getElementById("chartHum");

          chart1.innerHTML = "";
          chart2.innerHTML = "";

          history.forEach((item) => {
            const a = createBar(item.temperature, item.time, "temp");
            const b = createBar(item.humidity, item.time, "hum");

            chart1.appendChild(a);
            chart2.appendChild(b);
          });
        } catch (err) {
          console.log("err: ", err);
        }
      }

      setInterval(loadHistory, 3000);
    </script>
  </body>
</html>
